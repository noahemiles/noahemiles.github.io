<main>
    <header
        #headerEl
        class="site-header"
        [class.site-header--nav-open]="menuOpen"
    >
        <h1 class="site-header__title">
            <a routerLink="/" class="site-header__title-link">{{ title }}</a>
        </h1>
        <button
            type="button"
            class="site-header__toggle"
            (click)="toggleMenu()"
            [attr.aria-expanded]="menuOpen"
            aria-controls="site-nav"
            [attr.aria-label]="menuOpen ? 'Close menu' : 'Open menu'"
        >
            <span class="site-header__toggle-box" aria-hidden="true">
                <span class="site-header__toggle-bar"></span>
                <span class="site-header__toggle-bar"></span>
                <span class="site-header__toggle-bar"></span>
            </span>
        </button>
        <nav
            id="site-nav"
            class="site-header__nav"
            [class.site-header__nav--open]="menuOpen"
            aria-label="Primary"
        >
            <ul class="site-header__list" (click)="closeMenu()">
                <li><a routerLink="/projects" class="site-header__link">Projects</a></li>
                <li><a routerLink="/about" class="site-header__link">About</a></li>
                <li><a routerLink="/contact" class="site-header__link">Contact</a></li>
            </ul>
        </nav>
    </header>
    <router-outlet />
</main>
