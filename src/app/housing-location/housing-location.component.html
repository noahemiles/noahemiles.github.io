<section class="listing">
    <img [src]="housingLocation.photo" alt="Exterior photo of {{housingLocation.name}}" class="listing-photo" onerror="this.onerror=null; this.src='https://www.placekittens.com/300/300'">
    <div class="listing-bar">
        <h2 class="listing-heading">{{ housingLocation.name }}</h2>
        <p class="listing-location">{{ housingLocation.city }}, {{ housingLocation.state }}</p>
        <a [routerLink]="['/details', housingLocation.id]" class="listing-details">Learn More</a>
    </div>
</section>
