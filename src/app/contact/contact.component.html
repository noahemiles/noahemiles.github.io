<section class="contact" aria-label="Contact links">
    <a class="contact-bar contact-bar--email" [href]="emailHref">
        <span class="contact-bar__icon" aria-hidden="true">
            <svg class="contact-bar__svg contact-bar__svg--gmail" viewBox="0 0 24 24" role="img">
                <path
                    fill="#EA4335"
                    d="M24 5.457v13.909c0 .904-.732 1.636-1.636 1.636h-3.819V11.73L12 16.64l-6.545-4.91v9.273H1.636A1.636 1.636 0 0 1 0 19.366V5.457c0-2.182 2.861-2.986 4.09-1.378L12 9.545l7.273-5.465c1.229-1.608 4.09-.804 4.09 1.377z"
                />
            </svg>
        </span>
        <span class="contact-bar__body">
            <span class="contact-bar__label">Email</span>
            <span class="contact-bar__value">{{ email }}</span>
        </span>
        <span class="contact-bar__chevron" aria-hidden="true">→</span>
    </a>

    <a
        class="contact-bar contact-bar--linkedin"
        [href]="linkedInHref"
        target="_blank"
        rel="noopener noreferrer"
    >
        <span class="contact-bar__icon" aria-hidden="true">
            <svg class="contact-bar__svg contact-bar__svg--linkedin" viewBox="0 0 24 24" role="img">
                <path
                    fill="currentColor"
                    d="M20.447 20.452h-3.554v-5.569c0-1.328-.027-3.037-1.852-3.037-1.853 0-2.136 1.445-2.136 2.939v5.667H9.351V9h3.414v1.561h.046c.477-.9 1.637-1.85 3.37-1.85 3.601 0 4.267 2.37 4.267 5.455v6.286zM5.337 7.433a2.062 2.062 0 0 1-2.063-2.065 2.064 2.064 0 1 1 2.063 2.065zm1.782 13.019H3.555V9h3.564v11.452zM22.225 0H1.771C.792 0 0 .774 0 1.729v20.542C0 23.227.792 24 1.771 24h20.451C23.2 24 24 23.227 24 22.271V1.729C24 .774 23.2 0 22.222 0h.003z"
                />
            </svg>
        </span>
        <span class="contact-bar__body">
            <span class="contact-bar__label">LinkedIn</span>
            <span class="contact-bar__value">Profile</span>
        </span>
        <span class="contact-bar__chevron" aria-hidden="true">→</span>
    </a>
</section>
