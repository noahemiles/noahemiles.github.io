<a class="project-bar" [routerLink]="routerLinkPath">
    <span class="project-bar__icon" aria-hidden="true">
        <svg class="project-bar__svg" viewBox="0 0 24 24" role="img">
            <path
                fill="currentColor"
                d="M9.4 16.6L4.8 12l4.6-4.6L8 6l-6 6 6 6 1.4-1.4zm5.2 0l4.6-4.6-4.6-4.6L16 6l6 6-6 6-1.4-1.4z"
            />
        </svg>
    </span>
    <span class="project-bar__body">
        <span class="project-bar__value">{{ projectDetails.title }}</span>
    </span>
    <span class="project-bar__chevron" aria-hidden="true">→</span>
</a>
